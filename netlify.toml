[build]
  publish = "public"

[[redirects]]
  from = "/"
  to   = "/index.html"
  status = 200

[[redirects]]
  from = "/map"
  to   = "/map.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
